services:
  db:
    image: postgres:15-alpine
    container_name: edgeways-leads-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edgeways_leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edgeways_leads"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: edgeways-leads-app
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/edgeways_leads
      COMPANIES_HOUSE_API_KEY: ${COMPANIES_HOUSE_API_KEY}
      AUTH_USERNAME: ${AUTH_USERNAME:-rdtzn1}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-supersecretpassword}
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: edgeways-leads-caddy
    restart: always
    ports:
      - "80:80"
      - "3000:3000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - app

volumes:
  pgdata:
    driver: local
